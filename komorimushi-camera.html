<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F0">
<title>こもりむし ｜ かざして みつける</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  body{
    background:#EDEAE0; color:#2C2C2A; min-height:100dvh;
    font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:18px;
  }
  /* iPhone frame */
  .phone{ width:100%; max-width:392px; height:min(840px,94dvh); background:#FAF7F0;
          border-radius:42px; box-shadow:0 18px 50px rgba(60,55,45,.28), inset 0 0 0 2px #fff;
          display:flex; flex-direction:column; overflow:hidden; position:relative; }
  .notch{ position:absolute; top:10px; left:50%; transform:translateX(-50%); width:118px; height:26px;
          background:#1c1b18; border-radius:0 0 16px 16px; z-index:60; }

  header{ display:flex; align-items:center; gap:10px; padding:30px 20px 8px; }
  header .ttl{ font-size:19px; font-weight:700; color:#3A3A37; letter-spacing:.01em; }
  header .live{ margin-left:auto; font-size:11px; color:#A8A69D; display:flex; align-items:center; gap:5px; }
  header .live::before{ content:""; width:7px; height:7px; border-radius:50%; background:#7FA15B; }

  /* STAGE */
  .stage{ flex:1; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; margin:6px 16px 0; }
  .frame{ position:absolute; inset:0; border-radius:26px;
          background:radial-gradient(120% 90% at 50% 28%, #EFEFE6 0%, #E4E6DC 55%, #D7DBCB 100%);
          border:1px solid #DDD7C8; }
  .frame::after{ content:""; position:absolute; inset:16px; border-radius:18px; border:2px dashed #C7C2B0; opacity:.5; }
  .hint{ position:relative; z-index:5; text-align:center; color:#8a887f; font-size:15px; line-height:1.8; padding:0 30px; }
  .hint .big{ display:block; font-size:46px; margin-bottom:8px; }

  .photo{ position:absolute; inset:0; border-radius:26px; object-fit:cover; width:100%; height:100%; opacity:0;
          transition:opacity .3s ease; z-index:2; }
  .photo.show{ opacity:1; }
  .scrim{ position:absolute; inset:0; border-radius:26px; background:rgba(40,38,34,.32); opacity:0; transition:opacity .3s; z-index:3; }
  .scrim.show{ opacity:1; }

  .think{ position:relative; z-index:6; opacity:0; transition:opacity .25s; text-align:center; color:#fff; }
  .think.show{ opacity:1; }
  .think .dots{ display:inline-flex; gap:7px; margin-bottom:10px; }
  .think .dots i{ width:10px; height:10px; border-radius:50%; background:#FAEEDA; display:block; animation:bounce 1s infinite; }
  .think .dots i:nth-child(2){ animation-delay:.15s; } .think .dots i:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,100%{ transform:translateY(0); opacity:.5;} 50%{ transform:translateY(-8px); opacity:1;} }
  .think .tx{ font-size:16px; font-weight:600; text-shadow:0 1px 3px rgba(0,0,0,.3); }

  /* discovery effect (reused) */
  .glow{ position:absolute; width:230px; height:230px; border-radius:50%; opacity:0; z-index:7;
         background:radial-gradient(circle, rgba(250,199,117,.9) 0%, rgba(250,199,117,0) 70%); }
  .ring{ position:absolute; width:46px; height:46px; border-radius:50%; border:4px solid #FAC775; opacity:0; z-index:7; }
  .charwrap{ position:relative; z-index:9; width:210px; height:210px; display:flex; align-items:center; justify-content:center; opacity:0; transform:scale(.4); }
  .charwrap svg{ width:188px; height:188px; filter:drop-shadow(0 8px 14px rgba(80,60,30,.22)); }
  .flash{ position:absolute; width:140px; height:140px; border-radius:50%; opacity:0; z-index:8;
          background:radial-gradient(circle,#fff 0%, rgba(255,255,255,0) 70%); }
  .ring2{ position:absolute; width:46px; height:46px; border-radius:50%; border:4px solid #FAC775; opacity:0; z-index:7; }
  .burst{ position:absolute; left:50%; top:50%; width:0; height:0; z-index:8; pointer-events:none; }
  .burst .p{ position:absolute; left:0; top:0; border-radius:50%; opacity:0; }
  .burst .spark{ position:absolute; left:0; top:0; line-height:1; color:#FAC775; opacity:0; }

  .stage.pop .glow{ animation:glowpop 1.4s ease-out forwards; }
  .stage.pop .flash{ animation:flashpop .5s ease-out forwards; }
  .stage.pop .ring{ animation:ringpop 1.1s ease-out forwards; }
  .stage.pop .ring2{ animation:ringpop 1.1s ease-out .22s forwards; }
  .stage.pop .burst .p{ animation:fly var(--d,.9s) cubic-bezier(.15,.7,.3,1) forwards; }
  .stage.pop .burst .spark{ animation:twinkle 1s ease-out forwards; }
  /* base entrance (plants): gentle unfold */
  .stage.pop .charwrap{ animation:charpop 1.2s cubic-bezier(.2,1.5,.4,1) .3s forwards; }
  /* 地のむし: ポンと出てブブッと震える */
  .stage.pop.crawl .charwrap{ animation:charpop 1.1s cubic-bezier(.2,1.6,.35,1) .3s forwards, buzz .55s ease-in-out 1.4s 1; }
  /* 飛ぶむし: ポンと出てふわふわ浮く */
  .stage.pop.fly .charwrap{ animation:charpop 1s cubic-bezier(.2,1.6,.35,1) .3s forwards, hover 2.6s ease-in-out 1.35s infinite; }

  @keyframes glowpop{ 0%{opacity:0;transform:scale(.3);} 40%{opacity:1;} 100%{opacity:.5;transform:scale(1.1);} }
  @keyframes flashpop{ 0%{opacity:0;transform:scale(.3);} 22%{opacity:.95;} 100%{opacity:0;transform:scale(1.7);} }
  @keyframes ringpop{ 0%{opacity:.9;transform:scale(.3);} 100%{opacity:0;transform:scale(3.6);} }
  @keyframes charpop{ 0%{opacity:0;transform:scale(.4) rotate(-8deg);} 60%{opacity:1;transform:scale(1.12) rotate(3deg);} 100%{opacity:1;transform:scale(1) rotate(0);} }
  @keyframes fly{ 0%{transform:translate(-50%,-50%) scale(.3); opacity:0;} 12%{opacity:1;} 100%{transform:translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(var(--s,1)); opacity:0;} }
  @keyframes twinkle{ 0%{opacity:0; transform:translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(0) rotate(0);}
                      45%{opacity:1; transform:translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(1.2) rotate(45deg);}
                      100%{opacity:0; transform:translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(.5) rotate(90deg);} }
  @keyframes buzz{ 0%,100%{transform:scale(1) rotate(0) translateX(0);} 20%{transform:scale(1.05) rotate(-7deg) translateX(-3px);}
                   40%{transform:scale(1.04) rotate(6deg) translateX(3px);} 60%{transform:scale(1.03) rotate(-4deg) translateX(-2px);}
                   80%{transform:scale(1.02) rotate(3deg) translateX(2px);} }
  @keyframes hover{ 0%,100%{transform:translateY(0) rotate(-2.5deg);} 50%{transform:translateY(-9px) rotate(2.5deg);} }

  @media (prefers-reduced-motion: reduce){
    .burst{ display:none; }
    .stage.pop .charwrap, .stage.pop.crawl .charwrap, .stage.pop.fly .charwrap{ animation:charpop .4s ease forwards; }
    .stage.pop .ring2{ animation:none; }
  }

  .qbig{ position:relative; z-index:9; opacity:0; transition:opacity .4s; text-align:center; }
  .qbig.show{ opacity:1; }
  .qbig .qm{ width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,.9); display:flex; align-items:center; justify-content:center; font-size:54px; color:#b3b1a8; margin:0 auto 6px; }

  /* PLATE */
  .plate{ min-height:96px; padding:14px 22px 6px; text-align:center; }
  .kidword{ margin:0; font-size:25px; font-weight:800; color:#3A3A37; opacity:0; transform:translateY(6px); transition:.4s .2s; }
  .kidword.show{ opacity:1; transform:none; }
  .parent{ margin-top:8px; opacity:0; transition:.4s .45s; }
  .parent.show{ opacity:1; }
  .parent .wa{ font-size:16px; font-weight:600; color:#5F5E5A; }
  .parent .ga{ font-size:13px; color:#9a9890; font-style:italic; margin-left:7px; }
  .parent .note{ display:block; margin-top:7px; font-size:13px; line-height:1.6; color:#8a887f; }
  .conf{ display:inline-block; margin-top:9px; font-size:11px; font-weight:700; padding:3px 11px; border-radius:999px; letter-spacing:.03em; }
  .conf.high{ background:#E4F0DA; color:#4e7a37; } .conf.mid{ background:#FAEEDA; color:#8f590f; } .conf.low{ background:#F0E6E6; color:#a06b66; }

  /* CONTROLS */
  .controls{ padding:6px 18px 14px; }
  .primary{ width:100%; padding:18px; border:none; border-radius:18px; background:#FAEEDA; color:#633806;
            font-size:18px; font-weight:800; font-family:inherit; cursor:pointer; box-shadow:0 4px 0 #E7C58B; }
  .primary:active{ transform:translateY(2px); box-shadow:0 2px 0 #E7C58B; }
  .primary:disabled{ opacity:.55; box-shadow:0 4px 0 #E7C58B; }
  .row{ display:flex; gap:10px; }
  .gbtn{ flex:1; padding:16px; border-radius:16px; font-size:16px; font-weight:700; font-family:inherit; cursor:pointer; }
  .gs{ background:#FFFDF9; border:1px solid #DDD7C8; color:#5F5E5A; }
  .gp{ background:#BA7517; border:none; color:#fff; box-shadow:0 4px 0 #8f590f; } .gp:active{ transform:translateY(2px); box-shadow:0 2px 0 #8f590f; }
  .hide{ display:none !important; }

  /* ZUKAN strip */
  .zukan{ border-top:1px solid #ECE8DC; padding:11px 18px 16px; }
  .zukan .lab{ font-size:12px; color:#A8A69D; margin-bottom:8px; display:flex; align-items:center; gap:7px; }
  .zukan .lab b{ color:#7a786f; font-weight:700; }
  .strip{ display:flex; gap:9px; overflow-x:auto; min-height:58px; align-items:center; }
  .strip .empty{ font-size:13px; color:#bdbbb2; }
  .chip{ flex:0 0 auto; width:54px; height:54px; border-radius:14px; background:#F1EFE8; display:flex; align-items:center; justify-content:center; animation:chippop .5s cubic-bezier(.2,1.5,.4,1); }
  .chip svg{ width:46px; height:46px; }
  @keyframes chippop{ 0%{transform:scale(.2);opacity:0;} 100%{transform:scale(1);opacity:1;} }

  .err{ position:absolute; left:0; right:0; bottom:0; z-index:9; text-align:center; color:#fff; font-size:14px; font-weight:600; padding:14px; text-shadow:0 1px 3px rgba(0,0,0,.4); }
</style>

    <path d="M127.5,125.57c-17.57.34-32.87-5.53-32.87-5.53,3.88,7.31,12.61,12.54,20.03,10.67,7.42-1.87,12.84-2.28,12.84-2.28,0,0,5.42.41,12.84,2.28,7.42,1.87,16.15-3.36,20.03-10.67,0,0-15.3,5.87-32.87,5.53Z" style="fill: #cea284;" />

    <header>
      <span class="ttl">こもりむし</span>
      <span class="live">Claude が みています</span>
    </header>

    <div class="stage" id="stage">
      <div class="frame"></div>
      <img class="photo" id="photo" alt="">
      <div class="scrim" id="scrim"></div>

      <div class="hint" id="hint"><span class="big">🔍</span>みつけた いきものを<br>しゃしんに とってみよう</div>

      <div class="think" id="think"><div class="dots"><i></i><i></i><i></i></div><div class="tx">なにが いるかな…</div></div>

      <div class="glow"></div>
      <div class="flash"></div>
      <div class="ring"></div>
      <div class="ring2"></div>
      <div class="burst" id="burst"></div>
      <div class="charwrap" id="charwrap"><svg viewBox="0 0 256 256"><use id="charuse" href="#k-leaf"></use></svg></div>

      <div class="qbig" id="qbig"><div class="qm">？</div></div>
      <div class="err hide" id="err"></div>
    </div>

    <div class="plate">
      <p class="kidword" id="kidword"></p>
      <div class="parent" id="parent">
        <span class="wa" id="wa"></span><span class="ga" id="ga"></span>
        <span class="note" id="note"></span>
        <span class="conf" id="conf"></span>
      </div>
    </div>

    <div class="controls">
      <button class="primary" id="shoot">しゃしんで さがす</button>
      <div class="row hide" id="after">
        <button class="gbtn gs" id="again">もういちど</button>
        <button class="gbtn gp" id="collect">ずかんに いれる</button>
      </div>
    </div>

    <div class="zukan">
      <div class="lab">きょう みつけた <b id="cnt">0</b></div>
      <div class="strip" id="strip"><span class="empty">まだ だれも いないよ</span></div>
    </div>

    <input type="file" id="file" accept="image/*" capture="environment" style="display:none">
  </div>

<script>
// ▼▼▼ ここに Cloudflare Worker の URL を貼る（末尾スラッシュなし） ▼▼▼
const PROXY_URL = "";
// ▲▲▲ 例: "https://komorimushi.あなた.workers.dev" ▲▲▲

const KOBITO = {
  happa:{id:'#k-leaf',  name:'はっぱ'},
  hana:{id:'#k-hana',   name:'はな'},
  dango:{id:'#k-dango', name:'だんご'},
  tentou:{id:'#k-tentou',name:'てんとう'},
  imomushi:{id:'#k-imomushi',name:'いもむし'},
  chouchou:{id:'#k-chouchou',name:'ちょうちょ'},
  tonbo:{id:'#k-tonbo', name:'トンボ'},
  kumo:{id:'#k-kumo',   name:'クモ'}
};
// 出現エフェクトのカテゴリ（共通層は同じ、虫だけ出方を変える）
const CAT = { happa:'plant', hana:'plant', dango:'crawl', tentou:'crawl', imomushi:'crawl', kumo:'crawl', tonbo:'fly', chouchou:'fly' };

const $ = id => document.getElementById(id);
const stage=$('stage'), photo=$('photo'), scrim=$('scrim'), hint=$('hint'),
      think=$('think'), charwrap=$('charwrap'), charuse=$('charuse'), qbig=$('qbig'),
      err=$('err'), kidword=$('kidword'), parent=$('parent'), shoot=$('shoot'), after=$('after');
let collected = [];
let last = null;

shoot.onclick = ()=> $('file').click();
$('again').onclick = reset;
$('collect').onclick = collect;
$('file').onchange = e => { const f=e.target.files[0]; if(f) handle(f); e.target.value=''; };

function reset(){
  stage.classList.remove('pop','plant','crawl','fly');
  $('burst').innerHTML='';
  photo.classList.remove('show'); scrim.classList.remove('show');
  think.classList.remove('show'); qbig.classList.remove('show');
  kidword.classList.remove('show'); parent.classList.remove('show');
  charwrap.style.animation='none'; void charwrap.offsetWidth; charwrap.style.animation='';
  charwrap.style.opacity=0; charwrap.style.transform='scale(.4)';
  err.classList.add('hide'); hint.style.display='';
  after.classList.add('hide'); shoot.classList.remove('hide'); shoot.disabled=false;
  last=null;
}

function handle(file){
  reset();
  hint.style.display='none';
  const reader=new FileReader();
  reader.onload = ()=>{
    const img=new Image();
    img.onload = ()=>{
      // downscale to max 1024 for a fast, light request
      const max=1024; let {width:w,height:h}=img;
      const s=Math.min(1, max/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=c.toDataURL('image/jpeg',0.85);
      photo.src=dataUrl; photo.classList.add('show'); scrim.classList.add('show');
      shoot.disabled=true; shoot.classList.add('hide');
      think.classList.add('show');
      judge(dataUrl.split(',')[1]);
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

async function judge(b64){
  try{
    if(!PROXY_URL){
      throw new Error("中継サーバーの URL が設定されていません（PROXY_URL が空）");
    }
    const res = await fetch(PROXY_URL,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ image: b64 })
    });
    if(!res.ok){
      const t = await res.text().catch(()=> "");
      throw new Error("(HTTP "+res.status+") "+t.slice(0,120));
    }
    const out = await res.json();
    show(out);
  }catch(e){
    think.classList.remove('show');
    err.textContent = "うまく みえなかった。もういちど！";
    err.classList.remove('hide');
    after.classList.remove('hide');
    console.error(e);
  }
}

// 粒子バースト：虫は多め・速め・あたたかい色、植物はひかえめ・緑寄り
function spawnBurst(cat){
  const burst=$('burst'); burst.innerHTML='';
  const insect = (cat==='crawl' || cat==='fly');
  const n = insect ? 22 : 13;
  const reach = insect ? 130 : 95;
  const pal = insect
    ? ['#FAC775','#FAEEDA','#F7B05B','#FFE08A','#E7C58B','#C0DD97']
    : ['#C0DD97','#A9C487','#FAEEDA','#FAC775'];
  for(let i=0;i<n;i++){
    const a = (Math.PI*2*i/n) + (Math.random()-0.5)*0.5;
    const dist = (insect?60:48) + Math.random()*reach*0.55;
    const sz = 4 + Math.random()*(insect?8:6);
    const p=document.createElement('span'); p.className='p';
    p.style.width=sz+'px'; p.style.height=sz+'px';
    p.style.background=pal[i%pal.length];
    p.style.setProperty('--tx',(Math.cos(a)*dist).toFixed(1)+'px');
    p.style.setProperty('--ty',(Math.sin(a)*dist).toFixed(1)+'px');
    p.style.setProperty('--s',(0.25+Math.random()*0.7).toFixed(2));
    p.style.setProperty('--d',((insect?0.6:0.75)+Math.random()*0.45).toFixed(2)+'s');
    burst.appendChild(p);
  }
  const sn = insect ? 6 : 4;
  for(let i=0;i<sn;i++){
    const a = Math.PI*2*i/sn + 0.4;
    const dist = 46 + Math.random()*42;
    const s=document.createElement('span'); s.className='spark'; s.textContent='✦';
    s.style.setProperty('--sx',(Math.cos(a)*dist).toFixed(1)+'px');
    s.style.setProperty('--sy',(Math.sin(a)*dist).toFixed(1)+'px');
    s.style.fontSize=(12+Math.random()*10)+'px';
    s.style.animationDelay=(Math.random()*0.25).toFixed(2)+'s';
    burst.appendChild(s);
  }
}

function show(out){
  think.classList.remove('show');
  const k = KOBITO[out.group];
  if(k){
    last = {group:out.group, ...k};
    const cat = CAT[out.group] || 'crawl';
    charuse.setAttribute('href', k.id);
    stage.classList.add(cat);
    spawnBurst(cat);
    requestAnimationFrame(()=>{ stage.classList.add('pop'); });
    kidword.textContent = out.kidword || (k.name+'の こびとだ！');
    $('wa').textContent = out.wamei || '';
    $('ga').textContent = out.gakumei ? out.gakumei : '';
    $('note').textContent = out.note || '';
    const cf=$('conf'); cf.textContent = ({high:'たしか',mid:'たぶん',low:'…かも'})[out.confidence]||'';
    cf.className = 'conf '+(out.confidence||'mid');
    setTimeout(()=>{ kidword.classList.add('show'); parent.classList.add('show'); }, 700);
    $('collect').classList.remove('hide');
  } else {
    // たね・きのこ等 = まだ一座にいない / 生きもの以外
    qbig.classList.add('show');
    kidword.textContent = out.kidword || 'うーん、まだ ずかんに いないかも';
    $('wa').textContent=''; $('ga').textContent='';
    $('note').textContent = out.note || '';
    $('conf').textContent='';
    setTimeout(()=>{ kidword.classList.add('show'); parent.classList.add('show'); }, 250);
    $('collect').classList.add('hide');
  }
  after.classList.remove('hide');
}

function collect(){
  if(!last) return;
  if(!collected.includes(last.group)){
    collected.push(last.group);
    const strip=$('strip'); const e=strip.querySelector('.empty'); if(e) e.remove();
    const chip=document.createElement('div'); chip.className='chip';
    chip.innerHTML='<svg viewBox="0 0 256 256"><use href="'+last.id+'"></use></svg>';
    strip.appendChild(chip);
    $('cnt').textContent=collected.length;
  }
  reset();
}
</script>
</body>
</html>
